name: Waka Readme

on:
    schedule:
        - cron: "0 0 * * *"
    workflow_dispatch:
jobs:
    update-readme:
        name: Update Readme with Metrics
        runs-on: ubuntu-latest
        steps:
            - uses: athul/waka-readme@master
              with:
                  WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
                  LANG_COUNT: 10
                  COMMIT_MESSAGE: "chore(waka): update coding metrics [skip ci]"
